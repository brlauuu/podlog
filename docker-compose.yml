services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: podlog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: ./apps/pipeline
      dockerfile: Dockerfile.control
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/podlog
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - audio_data:/data/audio
      - transcript_data:/data/transcripts
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Returns 200 only after migrations complete and app is ready
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: ./apps/pipeline
      dockerfile: Dockerfile.worker
    command: >
      sh -c "python -m app.tasks.prewarm && python -m app.worker"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/podlog
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - audio_data:/data/audio
      - transcript_data:/data/transcripts
      - model_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      pipeline:
        condition: service_healthy  # Ensures migrations are done before worker writes to DB

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 6g

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/podlog
      PIPELINE_API_URL: http://pipeline:8000
    volumes:
      - audio_data:/data/audio:ro
    depends_on:
      db:
        condition: service_healthy
      pipeline:
        condition: service_healthy  # Waits for migrations -- prevents schema-not-found errors

volumes:
  postgres_data:
  audio_data:
  transcript_data:
  model_cache:
  ollama_data:
