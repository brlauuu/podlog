services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: podlog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: ./apps/pipeline
      dockerfile: Dockerfile.control
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/podlog
      # Mirrored from the backup service (#630) so /api/backups (#646)
      # can report retention to the Settings UI.
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_RETENTION_MONTHLY: ${BACKUP_RETENTION_MONTHLY:-12}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - audio_data:/data/audio
      - transcript_data:/data/transcripts
      # Read-write mount: /api/backups (#646) lists available backups, and
      # the DELETE endpoints under /api/backups/{db,audio}/... (#687) remove
      # individual dumps and snapshots. Those endpoints validate tier and
      # filename/date with strict regexes and guard against path traversal —
      # they're the only writes the pipeline ever does under /backups.
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Returns 200 only after migrations complete and app is ready
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: ./apps/pipeline
      dockerfile: Dockerfile.worker
    command: >
      sh -c "python -m app.tasks.prewarm && python -m app.worker"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/podlog
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - audio_data:/data/audio
      - transcript_data:/data/transcripts
      - model_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      pipeline:
        condition: service_healthy  # Ensures migrations are done before worker writes to DB

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 20g

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/podlog
      PIPELINE_API_URL: http://pipeline:8000
    volumes:
      - audio_data:/data/audio:ro
      - ./docs/guide:/docs/guide:ro
      - ./docs/about.md:/docs/about.md:ro
      - ./CHANGELOG.md:/docs/CHANGELOG.md:ro
      # /api/version reads this at request time and compares against
      # NEXT_PUBLIC_APP_VERSION (baked at build time) so the footer can
      # signal "your running image is stale, rebuild it" when VERSION
      # bumps between rebuilds.
      - ./VERSION:/version:ro
    depends_on:
      db:
        condition: service_healthy
      pipeline:
        condition: service_healthy  # Waits for migrations -- prevents schema-not-found errors

  # Issue #630: daily backup of the Podlog DB + audio archive.
  # Always-on. Set BACKUP_RETENTION_DAILY/WEEKLY/MONTHLY=0 to disable
  # individual buckets; set all three to 0 to opt out entirely.
  # Backups land on the host at ./backups/ (gitignored).
  backup:
    build: ./apps/backup
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: podlog
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_RETENTION_MONTHLY: ${BACKUP_RETENTION_MONTHLY:-12}
    volumes:
      # Not :ro — restore-audio.sh needs to write back. The backup loop is
      # read-only by design; the rsync command in backup.sh never targets
      # /source/.
      - audio_data:/source/audio
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Issue #607: optional Jupyter-based DB exploration environment.
  # Opt-in via Compose profile so a default `docker compose up` doesn't pull
  # the image or run the service. Start with `make explore` (or
  # `docker compose --profile explore up explore`).
  explore:
    build: ./apps/explore
    profiles: [explore]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/podlog
    ports:
      # Localhost-only binding — the Jupyter token is the only thing between
      # the world and your DB, so don't expose this off the box. If a user
      # needs remote access they should put it behind a reverse proxy.
      - "127.0.0.1:8888:8888"
    volumes:
      - ./notebooks:/workspace
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  audio_data:
  transcript_data:
  model_cache:
  ollama_data:
