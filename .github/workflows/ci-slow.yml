name: CI Slow (Integration and E2E)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-slow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline-integration:
    name: Pipeline Integration
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pipeline integration tests
        run: docker compose -f docker-compose.test.yml run --rm test pytest tests/integration/ -v

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run web e2e tests
        run: docker compose -f docker-compose.test.yml run --rm web_test
