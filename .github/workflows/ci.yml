name: CI Fast

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-sync:
    name: Docs sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify CLAUDE.md / docs/development.md reference real paths
        run: python scripts/check_docs_sync.py

  pipeline-unit-fast:
    name: Pipeline Unit Fast
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install pipeline dependencies (no ML extras)
        run: |
          poetry config virtualenvs.create false
          poetry install --with dev --without ml --no-interaction --no-ansi --no-root

      - name: Run pipeline unit tests (stable subset)
        run: |
          pytest tests/unit/test_api.py \
                 tests/unit/test_rag_helpers.py \
                 tests/unit/test_rag_endpoint.py \
                 tests/unit/test_rag_retrieval.py \
                 tests/unit/test_rag_models.py \
                 tests/unit/test_rag_streaming.py \
                 tests/unit/test_notification_settings.py \
                 tests/unit/test_embed_service.py -q

  web-unit-fast:
    name: Web Unit Fast
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Run web unit tests (stable subset)
        run: npm test -- --runTestsByPath tests/unit/notification-settings.test.tsx tests/unit/docs.test.tsx
